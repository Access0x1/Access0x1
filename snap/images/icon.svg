<svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Access0x1 Snap icon — the "0x1 access plug" emblem on a rounded night-water
    tile. Same glyph as web/public/access0x1-mark.svg (0 = a cyan socket ring
    holding three teal web3 dots, x = the crossed connection, 1 = the teal pin:
    wire web2 to web3), scaled into a 48x48 MetaMask icon tile with safe-area
    padding. Palette (BRAND.md): ink #0B1020, accent #22D3EE (cyan),
    accent-2 #2DD4BF (teal).
  -->
  <rect width="48" height="48" rx="12" fill="#0B1020"/>

  <g transform="translate(4,4) scale(0.625)">
    <!-- 0 : the socket ring (cyan structure) -->
    <circle cx="16" cy="32" r="11" fill="none" stroke="#22D3EE" stroke-width="4"/>
    <!-- the three web3 dots held in the socket (teal) -->
    <circle cx="11.6" cy="29.4" r="2.3" fill="#2DD4BF"/>
    <circle cx="20.4" cy="29.4" r="2.3" fill="#2DD4BF"/>
    <circle cx="16" cy="37.6" r="2.3" fill="#2DD4BF"/>
    <!-- x : the connection that flips the bit off -> on (cyan) -->
    <path d="M28 23 L41 41 M41 23 L28 41" stroke="#22D3EE" stroke-width="4" stroke-linecap="round"/>
    <!-- 1 : the pin — the bit lands ON (teal) -->
    <path d="M53 22 L53 42" stroke="#2DD4BF" stroke-width="4.6" stroke-linecap="round"/>
  </g>
</svg>
