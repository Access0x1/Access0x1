name: Audit

# Cyfrin-style audit CI, mirroring the fund-me reference workflow: format gate -> size-checked build
# -> full test suite -> aderyn static analysis. Separate from test.yml (CI) so the audit pass can be
# read at a glance and extended (slither/coverage) without bloating the fast test lane.
#
# NOTE (honesty, money-safety invariant #4): GitHub Actions may be billing-blocked on this org, in which case this
# workflow does not RUN in CI. Its CORRECTNESS still counts — it is the exact pass a maintainer runs
# locally via `make fmt-check && make sizes && make test && make aderyn`, encoded for when Actions is
# enabled. Nothing here depends on a secret.

permissions: {}

# MINUTES DISCIPLINE: push fires on main only (a PR branch push otherwise runs this ~20-min lane
# twice — push + pull_request events). On PRs the changes job below skips the lane entirely when
# the diff can't affect contracts; a skipped job satisfies branch protection.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  changes:
    name: Detect contract changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if [ "$EVENT" != "pull_request" ]; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git diff --name-only "$BASE_SHA" HEAD > /tmp/changed.txt
          if grep -qE '^(src/|test/|script/|lib/|foundry\.toml|remappings|Makefile|package(-lock)?\.json|\.github/)' /tmp/changed.txt; then
            echo "contracts=true" >> "$GITHUB_OUTPUT"
          else
            echo "contracts=false" >> "$GITHUB_OUTPUT"
          fi

  audit:
    name: Format + sizes + tests + aderyn
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive

      # Cache the foundryup download dir so the toolchain install reuses the fetched
      # binaries across runs instead of re-downloading them every time.
      - name: Cache Foundry toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.foundryup
          key: ${{ runner.os }}-foundryup-${{ hashFiles('foundry.toml') }}
          restore-keys: |
            ${{ runner.os }}-foundryup-

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@b00af27efadbc7b4ca8b82abbd903b17cc874d2a # v1.9.0

      - name: Show Forge version
        run: forge --version

      # cache: npm keys the shared ~/.npm download cache on the lockfiles below, so
      # `npm ci` reuses tarballs across runs. web/ is included so its lockfile invalidates
      # the same cache when it changes, even though only the root deps install here.
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # @chainlink/contracts lives in gitignored node_modules (the brownie repo is deprecated);
      # the remapping resolves into it, so deps must be installed before any build.
      - name: Install npm deps (Chainlink contracts)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Format gate (forge fmt --check)
        run: forge fmt --check

      - name: Size-checked build (forge build --sizes, EIP-170 24KB)
        run: forge build --sizes

      # FOUNDRY_PROFILE=ci selects [profile.ci.invariant] (runs=256, depth=128 = 32,768 calls per
      # target) over the default 64x64=4,096, so the audit lane runs the strong invariant campaign the
      # docs (AUDIT.md, audit/FINDINGS.md) claim. fuzz/default settings are inherited unchanged.
      - name: Full test suite (unit + invariant + attack + scenario + symbolic, CI profile — 256x128)
        env:
          FOUNDRY_PROFILE: ci
        run: forge test -vvv

      - name: Aderyn static analysis (src/)
        # Aderyn is the Cyfrin static analyser. It is advisory in CI (we resolve-or-justify findings in
        # audit/FINDINGS.md), so a non-zero exit annotates but does not fail the audit lane.
        continue-on-error: true
        run: |
          curl -L https://raw.githubusercontent.com/Cyfrin/aderyn/dev/cyfrinup/install | bash || true
          export PATH="$HOME/.cyfrin/bin:$PATH"
          if command -v aderyn >/dev/null 2>&1; then
            FOUNDRY_EVM_VERSION=cancun aderyn . --no-snippets
          else
            echo "aderyn not installed in this runner — see Makefile 'aderyn' target for the local pass"
          fi
