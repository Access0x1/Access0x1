name: OPSEC

# Forward-looking OPSEC gate for this PUBLIC repo: fail the build if a personal
# identity, an internal/private brand name, or a hardcoded secret ever enters
# tracked file content. It runs scripts/opsec-scan.sh, which greps the tracked
# tree (submodules excluded) and exits non-zero on any hit.
#
# NOTE: this does NOT scan git history/authorship. A past personal-email or
# real-name leak in commit metadata cannot be fixed without rewriting history
# (force-push is forbidden). This gate only stops the NEXT content leak.

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  opsec:
    name: Secret / brand / identity scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # No submodules: the scan skips submodule gitlinks anyway, and a shallow
      # top-level checkout is all it needs to read the tracked tree.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OPSEC scan
        run: bash scripts/opsec-scan.sh
