name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive

      # Restore the foundryup-installed toolchain (binaries land in ~/.foundry, the
      # installer in ~/.foundryup). Keyed on the pinned Foundry version below, so the
      # cache is rebuilt only when that version changes. A miss just re-runs foundryup.
      - name: Cache Foundry toolchain
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.foundry
            ~/.foundryup
          key: ${{ runner.os }}-foundry-stable

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@c7450ba673e133f5ee30098b3b54f444d3a2ca2d # v1.8.0
        with:
          version: stable

      - name: Show Forge version
        run: forge --version

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      # @chainlink/contracts lives in gitignored node_modules (the brownie repo is
      # deprecated); the remapping resolves into it, so deps must be installed first.
      - name: Install npm deps (Chainlink contracts)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Forge fmt
        run: forge fmt --check

      # The README CREATE3-mirror status table is generated from the committed broadcasts by
      # `make sync` (web/scripts/sync-readme-status.mjs). --check re-derives it and exits 1 if the
      # committed table drifts from what the broadcasts now prove, so the README can never go stale
      # silently. viem (a transitive import) lives in web/node_modules, so run it from web/.
      - name: README mirror-status not stale
        working-directory: web
        run: |
          npm ci --ignore-scripts --no-audit --no-fund
          node scripts/sync-readme-status.mjs --check

      # The Router ABI is duplicated (curated subsets) into web/lib/contracts.ts and
      # packages/react/src/abi.ts. This asserts every fragment they declare is byte-identical
      # to the canonical forge artifact, so a drifted decoder fails CI instead of shipping.
      - name: ABI single-source drift check
        run: node scripts/sync-abi.mjs

      - name: Run Forge build
        run: forge build --sizes

      # FOUNDRY_PROFILE=ci selects [profile.ci.invariant] (runs=256, depth=128 = 32,768 calls per
      # target) instead of the default 64x64=4,096, so CI actually runs the strong invariant campaign
      # the docs (AUDIT.md, audit/FINDINGS.md) claim. The fuzz/default settings are inherited unchanged.
      - name: Run Forge tests (CI profile — 256x128 invariants)
        env:
          FOUNDRY_PROFILE: ci
        run: forge test -vvv

  web:
    name: Web app (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      # Lint runs after the typecheck gate and before the suite so ESLint
      # violations surface early — before the slower test run.
      - name: Lint (next lint)
        run: npm run lint

      - name: Run tests (vitest)
        run: npm test

      # The fast lane previously stopped at vitest, so a change that broke the
      # production `next build` (or the vanilla embed) only surfaced at deploy time.
      # `next build` is secret-free (x402 builds its payment requirements lazily),
      # and check:embed validates public/embed.js — both belong in CI, matching the
      # local `gate` script.
      - name: Production build (next build)
        run: npm run build

      - name: Embed check (public/embed.js)
        run: npm run check:embed

  # The publishable SDK packages (@access0x1/react + create-access0x1) had no CI
  # coverage — their vitest suites only ran on a maintainer's machine. This job
  # runs them on every push/PR so a regression in the public SDK is caught here.
  packages:
    name: SDK packages (@access0x1/react + create-access0x1)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        # SHA-pinned: v4.4.0 (supply-chain hardening — a moved tag can't swap the action).
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/react/package-lock.json

      # @access0x1/react — typecheck then the vitest suite.
      - name: Install @access0x1/react deps
        working-directory: packages/react
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Typecheck @access0x1/react
        working-directory: packages/react
        run: npm run typecheck

      - name: Test @access0x1/react (vitest)
        working-directory: packages/react
        run: npm test

      # create-access0x1 ships a zero-dependency Node bin and has no test suite;
      # syntax-check the entrypoint so a broken scaffolder can't be published.
      - name: Syntax-check create-access0x1 bin
        working-directory: packages/create-access0x1
        run: node --check bin/index.mjs

  # snap/ and subgraph/ are Dependabot-tracked but had ZERO CI — a bump (or a source
  # change) could merge completely untested. These jobs run each package's own
  # gate so a regression is caught in CI, not on a maintainer's machine.
  snap:
    name: MetaMask Snap (typecheck + tests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: snap
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: snap/package-lock.json
      - name: Install deps
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  subgraph:
    name: Subgraph (codegen + build)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: subgraph
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: subgraph/package-lock.json
      - name: Install deps
        run: npm ci --ignore-scripts --no-audit --no-fund
      # codegen + build compile schema.graphql + src/mapping.ts against the ABI —
      # this is what catches a mapping/schema regression (e.g. a cross-token totals bug).
      - name: Codegen
        run: npm run codegen
      - name: Build
        run: npm run build
