name: CI

permissions: {}

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Foundry project
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Show Forge version
        run: forge --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # @chainlink/contracts lives in gitignored node_modules (the brownie repo is
      # deprecated); the remapping resolves into it, so deps must be installed first.
      - name: Install npm deps (Chainlink contracts)
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Run Forge fmt
        run: forge fmt --check

      - name: Run Forge build
        run: forge build --sizes

      - name: Run Forge tests
        run: forge test -vvv
