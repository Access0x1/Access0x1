# Access0x1 — Foundry config. Pinned, not chosen per-file (stack.md): one compiler,
# one EVM target, explicit remappings — ambiguity is what makes a multi-file build drift.
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.28"     # zksolc + cross-chain EVM safe (stack.md); latest is 0.8.35
evm_version = "cancun"      # TSTORE/TLOAD available; we still use storage ReentrancyGuard
optimizer = true
optimizer_runs = 200
via_ir = true               # IR pipeline: handles the wide PaymentReceived event + multi-leg
                            # settlement without stack-too-deep, and optimizes harder (gas = the pitch)
bytecode_hash = "none"      # clean, reproducible bytecode for aderyn/slither + verify
cbor_metadata = false
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "@chainlink/contracts/=node_modules/@chainlink/contracts/",  # npm dep — chainlink-brownie is deprecated
    "forge-std/=lib/forge-std/src/",
]
# DevOpsTools.get_most_recent_deployment() reads broadcast/out to resolve the latest router per chain
fs_permissions = [
    { access = "read", path = "./broadcast" },
    { access = "read", path = "./out" },
]

[profile.default.fuzz]
runs = 256

# The 6 router money invariants must hold WITHOUT swallowed reverts — handlers bound their
# inputs and early-return on invalid preconditions, so a revert is a real failure.
[profile.default.invariant]
runs = 64
depth = 64
fail_on_revert = true

[profile.ci.invariant]
runs = 256
depth = 128
fail_on_revert = true

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"

# Resolved from env at runtime — NEVER hardcode an RPC/address (security.md).
[rpc_endpoints]
arc_testnet = "${ARC_TESTNET_RPC_URL}"
sepolia = "${SEPOLIA_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
zksync_sepolia = "${ZKSYNC_SEPOLIA_RPC_URL}"

# Fallback ONLY — not the default. zkSync Era's ZK-Stack EVM should accept the cancun build, but if
# `forge script` bytecode is rejected because a Cancun opcode (e.g. PUSH0) is unsupported on the
# target, broadcast with `--profile zksync` to drop to shanghai. CONFIRM at the zkSync booth before
# the live run; never make this the default (the rest of the fleet targets cancun).
[profile.zksync]
evm_version = "shanghai"
