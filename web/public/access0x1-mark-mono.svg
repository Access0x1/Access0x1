<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Access0x1 mark — single-color / monochrome version
    Use currentColor so the parent element controls hue.
    Default fill is white (#F5F7FB) for use on dark backgrounds.
    For light backgrounds: set fill="#0B1020" on the <svg> element
    or wrap in a <g fill="#0B1020">.
    No teal accent — pure single-color.
  -->

  <!-- Left pylon -->
  <rect x="6" y="16" width="12" height="42" rx="3" fill="currentColor"/>
  <!-- Right pylon -->
  <rect x="46" y="16" width="12" height="42" rx="3" fill="currentColor"/>
  <!-- Top span left -->
  <rect x="6" y="6" width="22" height="12" rx="3" fill="currentColor"/>
  <!-- Top span right -->
  <rect x="36" y="6" width="22" height="12" rx="3" fill="currentColor"/>
  <!-- Base rail (same color in mono — unbroken ground) -->
  <rect x="6" y="54" width="52" height="4" rx="2" fill="currentColor"/>
</svg>
