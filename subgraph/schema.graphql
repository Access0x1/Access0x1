# Access0x1 payment-history schema — indexed from the PUBLIC Access0x1Router
# `PaymentReceived` event. Read-only analytics, OFF the money path: this never
# affects settlement, and if The Graph is unavailable the money path is unchanged
# (the dashboard simply falls back to direct on-chain reads).

"A single settled payment — one immutable row per PaymentReceived event."
type Payment @entity(immutable: true) {
  "txHash + log index."
  id: Bytes!
  "The merchant aggregate this payment rolls into."
  merchant: Merchant!
  "Router merchant id (also on the merchant aggregate)."
  merchantId: BigInt!
  buyer: Bytes!
  "Settlement token (address(0) = native)."
  token: Bytes!
  grossAmount: BigInt!
  feeAmount: BigInt!
  netAmount: BigInt!
  "USD amount, 8 decimals (the quoted price)."
  usdAmount8: BigInt!
  orderId: Bytes!
  "CCIP source-chain selector; 0 for a same-chain payment."
  srcChainSelector: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

"Per-merchant running totals — what a dashboard reads in one query."
type Merchant @entity(immutable: false) {
  "merchantId, UTF-8 encoded."
  id: Bytes!
  merchantId: BigInt!
  "Current owner — set at MerchantRegistered, moved ONLY by the 2-step MerchantOwnerTransferred (never MerchantUpdated). Null until the registration event is indexed."
  owner: Bytes
  "Payout recipient (mutable via MerchantUpdated)."
  payout: Bytes
  "Fee recipient (mutable via MerchantUpdated)."
  feeRecipient: Bytes
  "Merchant fee in basis points (mutable via MerchantUpdated)."
  feeBps: Int
  "Whether the merchant is active (toggled by MerchantUpdated)."
  active: Boolean
  "keccak of the merchant name, set at registration."
  nameHash: Bytes
  "Block timestamp of MerchantRegistered."
  registeredAt: BigInt
  "Block number of MerchantRegistered."
  registeredBlock: BigInt
  paymentCount: BigInt!
  "USD amount, 8 decimals — the ONLY unit-safe cross-token running total."
  totalUsd8: BigInt!
  lastPaymentAt: BigInt!
  payments: [Payment!]! @derivedFrom(field: "merchant")
  "Per-token native-unit totals — token base units are NOT comparable across tokens (6-dec USDC vs 18-dec native), so they live here, one row per (merchant, token), never summed into one BigInt."
  tokenTotals: [MerchantToken!]! @derivedFrom(field: "merchant")
}

"Per-(merchant, token) native-unit running totals. Splitting by token is what keeps grossAmount/feeAmount/netAmount meaningful — summing a 6-decimal USDC amount with an 18-decimal native amount into one field produces garbage money."
type MerchantToken @entity(immutable: false) {
  "merchantId + token address, UTF-8 encoded."
  id: Bytes!
  merchant: Merchant!
  merchantId: BigInt!
  "Settlement token (address(0) = native)."
  token: Bytes!
  paymentCount: BigInt!
  totalGross: BigInt!
  totalFees: BigInt!
  totalNet: BigInt!
  lastPaymentAt: BigInt!
}
